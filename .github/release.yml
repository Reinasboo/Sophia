# Auto-generated release notes configuration
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - automated
      - dependencies
  categories:
    - title: "🚀 Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔒 Security"
      labels:
        - security
    - title: "📝 Documentation"
      labels:
        - documentation
    - title: "🔧 DevOps & Infrastructure"
      labels:
        - ci
        - devops
        - infrastructure
    - title: "🧹 Maintenance"
      labels:
        - chore
        - refactor
    - title: "📦 Dependencies"
      labels:
        - dependencies
