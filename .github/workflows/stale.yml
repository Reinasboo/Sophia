name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 2 * * 0" # Weekly on Sunday at 2 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been inactive for 60 days. If this is still relevant,
            please comment to keep it open. Otherwise, it will be closed in 7 days.
          stale-pr-message: >
            This PR has been inactive for 30 days. Please update or it will be
            closed in 7 days.
          close-issue-message: "Closed due to inactivity. Feel free to reopen if still relevant."
          close-pr-message: "Closed due to inactivity. Feel free to reopen if still relevant."
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 7
          days-before-pr-close: 7
          exempt-issue-labels: "pinned,security,help-wanted"
          exempt-pr-labels: "pinned,work-in-progress"
