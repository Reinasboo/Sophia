openapi: 3.0.0
info:
  title: Sophia Agentic Wallet System API
  version: 1.0.0
  description: REST API for autonomous wallet agents and service-scoped payments on Solana
  contact:
    name: Development Team

servers:
  - url: http://localhost:3001
    description: Local development server
  - url: https://sophia-production-1a83.up.railway.app
    description: Production server

paths:
  /agents:
    get:
      summary: List all registered agents
      operationId: listAgents
      tags:
        - Agents
      responses:
        '200':
          description: List of agents with current status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentInfo'

    post:
      summary: Create a new managed agent
      operationId: createAgent
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '201':
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInfo'
        '400':
          description: Invalid request

  /agents/{id}:
    get:
      summary: Get agent details
      operationId: getAgent
      tags:
        - Agents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInfo'
        '404':
          description: Agent not found

    patch:
      summary: Update agent configuration
      operationId: updateAgent
      tags:
        - Agents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentConfigRequest'
      responses:
        '200':
          description: Agent updated
        '400':
          description: Invalid config

  /agents/{id}/run-cycle:
    post:
      summary: Manually trigger one agent decision cycle
      operationId: runAgentCycle
      tags:
        - Agents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cycle completed

  /byoa/agents/register:
    post:
      summary: Register external agent (BYOA flow)
      operationId: registerBYOAAgent
      tags:
        - BYOA External Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterExternalAgentRequest'
      responses:
        '201':
          description: Agent registered with control token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterExternalAgentResponse'

  /byoa/agents/{id}/submit-intent:
    post:
      summary: Submit intent from external agent
      operationId: submitBYOAIntent
      tags:
        - BYOA External Agents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitIntentRequest'
      responses:
        '200':
          description: Intent accepted
        '401':
          description: Unauthorized
        '400':
          description: Invalid intent

  /intents/submit:
    post:
      summary: Submit intent for execution
      operationId: submitIntent
      tags:
        - Intents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitIntentRequest'
      responses:
        '200':
          description: Intent queued

  /intents/history/{agentId}:
    get:
      summary: Get intent history for an agent
      operationId: getIntentHistory
      tags:
        - Intents
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Intent history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IntentRecord'

  /transactions/{id}:
    get:
      summary: Get transaction details
      operationId: getTransaction
      tags:
        - Transactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionRecord'

  /transactions/wallet/{walletId}:
    get:
      summary: Get all transactions for a wallet
      operationId: getWalletTransactions
      tags:
        - Transactions
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionRecord'

  /health:
    get:
      summary: Health check endpoint
      operationId: healthCheck
      tags:
        - System
      responses:
        '200':
          description: System operational
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /stats:
    get:
      summary: System statistics
      operationId: getStats
      tags:
        - System
      responses:
        '200':
          description: System statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStats'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AgentInfo:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [running, paused, error]
        walletId:
          type: string
        config:
          type: object
        createdAt:
          type: string
          format: date-time

    CreateAgentRequest:
      type: object
      required:
        - name
        - strategy
        - walletId
      properties:
        name:
          type: string
          minLength: 1
        strategy:
          type: string
          enum: [accumulator, distributor, balance_guard, scheduled_payer]
        walletId:
          type: string
        config:
          type: object

    UpdateAgentConfigRequest:
      type: object
      properties:
        config:
          type: object
        status:
          type: string
          enum: [running, paused]

    RegisterExternalAgentRequest:
      type: object
      required:
        - agentName
        - endpoint
        - walletId
      properties:
        agentName:
          type: string
        endpoint:
          type: string
          format: uri
        walletId:
          type: string
        serviceId:
          type: string

    RegisterExternalAgentResponse:
      type: object
      properties:
        agentId:
          type: string
        controlToken:
          type: string
          description: One-time bearer token for this agent (store securely)
        walletId:
          type: string

    SubmitIntentRequest:
      type: object
      required:
        - intentType
        - amount
      properties:
        intentType:
          type: string
          enum: [transfer_sol, transfer_token, check_balance]
        amount:
          type: number
        recipient:
          type: string
        mint:
          type: string
        data:
          type: object

    IntentRecord:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        intentType:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        executedAt:
          type: string
          format: date-time

    TransactionRecord:
      type: object
      properties:
        id:
          type: string
        walletId:
          type: string
        intentId:
          type: string
        signature:
          type: string
        status:
          type: string
        amount:
          type: number
        fee:
          type: number
        createdAt:
          type: string
          format: date-time

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, error]
        timestamp:
          type: string
          format: date-time
        rpc:
          type: string
        uptime:
          type: number

    SystemStats:
      type: object
      properties:
        totalAgents:
          type: integer
        activeAgents:
          type: integer
        totalTransactions:
          type: integer
        totalVolume:
          type: number
        errorRate:
          type: number
